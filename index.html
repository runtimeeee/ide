<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RuntimeeeeIDE - Advanced Edition</title>
<style>
/* CORE STYLES */
*{box-sizing:border-box}
body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:sans-serif;background:#1e1e1e;color:#fff}
#splash{position:fixed;inset:0;background:#1e1e1e;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity .8s}
#ide{display:none;width:100%;height:100%;flex-direction:column}
#ide.on{display:flex}
#toolbar{background:#2b2b2b;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;flex-shrink:0;border-bottom:1px solid #333}
#leftTools{display:flex;gap:6px;flex-wrap:wrap}
#leftTools button{padding:6px 14px;background:#3a3a3a;color:#eee;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:12px;transition:0.2s}
#leftTools button:hover{background:#4da3ff22;border-color:#4da3ff}
#brand{font-weight:bold;font-size:18px;color:#4da3ff;letter-spacing:1px}
#desktop{position:relative;flex:1;overflow:hidden;background: radial-gradient(circle, #252525 10%, #1e1e1e 90%);}

/* WINDOW SYSTEM */
.win{position:absolute;width:80%;height:72%;min-width:400px;min-height:300px;background:#2d2d2d;border:1px solid #555;display:flex;flex-direction:column;box-shadow:0 10px 30px #000a;border-radius:8px;overflow:hidden}
.winbar{background:#3c3c3c;padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:move;user-select:none;flex-shrink:0;border-bottom:1px solid #444}
.wintitle{flex:1;font-size:13px;font-weight:600;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winbar button{padding:4px 10px;font-size:12px;background:#2a2a2a;color:#ccc;border:1px solid #555;border-radius:4px;cursor:pointer}
.winbar button:hover{background:#ff4d4d33;border-color:#ff4d4d;color:#fff}
.winbody{flex:1;min-height:0;overflow:hidden;position:relative;background:#1a1a1a}

/* PROZYSENSE UI */
.proxy-container{display:flex;flex-direction:column;height:100%;padding:20px;gap:15px;align-items:center;justify-content:center;text-align:center}
.proxy-input-group{display:flex;width:100%;max-width:500px;background:#0d0d0d;border:1px solid #4da3ff44;border-radius:8px;padding:5px;overflow:hidden}
.proxy-input-group input{flex:1;background:transparent;border:none;color:#4da3ff;padding:12px;outline:none;font-family:monospace;font-size:14px}
.proxy-input-group button{background:#4da3ff;color:#000;border:none;padding:0 20px;font-weight:bold;cursor:pointer;border-radius:4px}
.proxy-status{font-size:12px;color:#666;margin-top:10px}
iframe{width:100%;height:100%;border:none;background:#fff}

/* TERMINAL / VM STYLES */
.vm-menu{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;height:100%}
.vm-menu h2{color:#4da3ff;margin:0}
</style>
</head>
<body>

<div id="splash"><div id="splashWrap"></div></div>

<div id="ide">
  <div id="toolbar">
    <div id="leftTools">
      <button id="btnVM">🐧 Linux VM</button>
      <button id="btnProxy">🌐 ProzySense</button>
      <button id="btnEdit">✏️ Edit Code</button>
    </div>
    <div id="brand">RuntimeeeeIDE</div>
  </div>
  <div id="desktop"></div>
</div>

<script>
(function(){
'use strict';

/* 1. SERVICE WORKER REGISTRATION */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Registering at root scope to allow proxying all paths
    navigator.serviceWorker.register('./coop-sw.js', { scope: '/' })
      .then(reg => console.log('ProzySense SW Registered:', reg.scope))
      .catch(err => console.error('SW Failed:', err));
  });
}

/* 2. SPLASH SCREEN LOGIC */
const WORD='RuntimeeeeIDE', sw=document.getElementById('splashWrap'), lets=[];
for(let i=0; i<WORD.length; i++){
  let s=document.createElement('span');
  s.textContent=WORD[i];
  s.style.cssText='display:inline-block;font-size:60px;font-weight:bold;color:#4da3ff;opacity:0;transform:scale(2);transition:0.5s ease;';
  sw.appendChild(s); lets.push(s);
}
lets.forEach((l, i) => setTimeout(() => { l.style.opacity='1'; l.style.transform='scale(1)'; }, i*150));
setTimeout(() => {
  document.getElementById('splash').style.opacity='0';
  setTimeout(() => {
    document.getElementById('splash').style.display='none';
    document.getElementById('ide').classList.add('on');
  }, 800);
}, 2500);

/* 3. WINDOW MANAGEMENT SYSTEM */
const desktop = document.getElementById('desktop');
let winCount = 0;

function makeWin(title) {
  const off = (winCount % 8) * 30; winCount++;
  const win = document.createElement('div'); win.className = 'win';
  win.style.top = (50 + off) + 'px'; win.style.left = (50 + off) + 'px';
  win.style.zIndex = 100 + winCount;

  win.innerHTML = `
    <div class="winbar">
      <span class="wintitle">${title}</span>
      <button class="close-btn">✕</button>
    </div>
    <div class="winbody"></div>
  `;

  // Dragging Logic
  const bar = win.querySelector('.winbar');
  bar.onmousedown = (e) => {
    let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
    document.onmousemove = (me) => {
      win.style.left = (me.clientX - ox) + 'px';
      win.style.top = (me.clientY - oy) + 'px';
    };
    document.onmouseup = () => document.onmousemove = null;
  };

  win.querySelector('.close-btn').onclick = () => win.remove();
  win.onmousedown = () => { win.style.zIndex = 100 + (++winCount); };
  
  desktop.appendChild(win);
  return win;
}

/* 4. PROZYSENSE (BLUE NEBULA) FEATURE */
document.getElementById('btnProxy').onclick = () => {
  const win = makeWin('ProzySense - Advanced Proxy');
  const body = win.querySelector('.winbody');

  body.innerHTML = `
    <div class="proxy-container">
      <h2>BlueNebula Web Proxy</h2>
      <p style="color:#aaa; font-size:13px;">Enter a URL to browse through the local host proxy.</p>
      <div class="proxy-input-group">
        <input type="text" id="urlInput" placeholder="https://google.com" value="https://google.com">
        <button id="launchProxy">GO</button>
      </div>
      <div class="proxy-status">Status: Service Worker Active via coop-sw.js</div>
    </div>
  `;

  win.querySelector('#launchProxy').onclick = () => {
    const rawUrl = win.querySelector('#urlInput').value;
    // Prefix URL for Service Worker interception
    const proxiedUrl = window.location.origin + '/service/' + encodeURIComponent(rawUrl);
    
    body.innerHTML = `<iframe src="${proxiedUrl}"></iframe>`;
    win.querySelector('.wintitle').textContent = "ProzySense: " + rawUrl;
  };
};

/* 5. PLACEHOLDER TOOLS */
document.getElementById('btnVM').onclick = () => {
  const win = makeWin('Linux VM (v86)');
  win.querySelector('.winbody').innerHTML = '<div class="vm-menu"><h2>Starting Linux Kernel...</h2><small>Requires SharedArrayBuffer via COOP headers</small></div>';
};

document.getElementById('btnEdit').onclick = () => {
  const win = makeWin('Code Editor');
  win.querySelector('.winbody').innerHTML = '<div style="padding:20px; color:#666;">Monaco Editor Loading...</div>';
};

})();
</script>
</body>
</html>
